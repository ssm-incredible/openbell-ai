name: OpenBell AI Daily

on:
  schedule:
    # 08:30 KST is 23:30 UTC on the previous calendar day. Weekdays only.
    - cron: "30 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-openbell-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect latest market data
        run: python src/collect_market_data.py --output market_data.json

      - name: Run OpenBell AI
        run: python src/main.py --data market_data.json --output result.html

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v6
        with:
          name: openbell-ai-result
          path: result.html

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p public
          cp result.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: run-openbell-ai
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
